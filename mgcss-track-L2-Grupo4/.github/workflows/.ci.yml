name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build
        run: cd mgcss-track-L2-Grupo4 && mvn clean compile

      - name: Test
        run: cd mgcss-track-L2-Grupo4 && mvn test
